name: Build and Push Development Docker Images

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/docker-build-auto-current.yml
      - Dockerfile
      - src/**
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:

concurrency:
  group: docker

jobs:
  build-and-push:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Build and push Docker image (single arch)
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        push: true
        platforms: linux/${{ matrix.arch }}
        build-args: |
          CMAKE_CUDA_ARCHITECTURES=121
        tags: ghcr.io/${{ env.REPO_LC }}:current-${{ matrix.arch }}

  manifest:
    needs: build-and-push
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository name
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Create and push multi-arch manifest tag
      shell: bash
      run: |
        IMAGE="ghcr.io/${REPO_LC}"

        docker buildx imagetools create \
          -t "${IMAGE}:current" \
          "${IMAGE}:current-amd64" \
          "${IMAGE}:current-arm64"

        docker buildx imagetools inspect "${IMAGE}:current"

  cleanup:
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
    - name: Set lowercase package name
      shell: bash
      run: |
        PACKAGE_NAME=${GITHUB_REPOSITORY##*/}
        echo "PACKAGE_NAME_LC=${PACKAGE_NAME,,}" >> $GITHUB_ENV

    - name: Clean up untagged (dangling) docker images
      uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
      with:
        owner: ${{ github.repository_owner }}
        package-name: ${{ env.PACKAGE_NAME_LC }}
        package-type: container
        min-versions-to-keep: 5
        delete-only-untagged-versions: 'true'
